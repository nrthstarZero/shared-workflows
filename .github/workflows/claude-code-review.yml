name: Claude Code Review

on:
  workflow_call:
    inputs:
      project_docs:
        description: 'Space-separated list of project doc files to read (e.g., "CLAUDE.md CLAUDE.react.md")'
        required: false
        type: string
        default: "CLAUDE.md"
      review_criteria:
        description: "Additional review criteria to append (markdown list items)"
        required: false
        type: string
        default: ""
      block_on_yellow:
        description: "Whether 🟡 issues should also trigger request-changes (default: false, only 🔴 blocks)"
        required: false
        type: boolean
        default: false
      model:
        description: 'Claude model to use (e.g., "claude-sonnet-4-6" for speed, "claude-opus-4-6" for depth)'
        required: false
        type: string
        default: "claude-sonnet-4-6"
      timeout_minutes:
        description: "Maximum minutes before the review job is cancelled (default: 15)"
        required: false
        type: number
        default: 15
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true

jobs:
  claude-review:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ fromJSON(inputs.timeout_minutes) }}
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            ## Steps

            1. Run `gh pr view ${{ github.event.pull_request.number }}` to understand the PR description and context.
            2. Run `gh pr view ${{ github.event.pull_request.number }} --json reviews --jq '.reviews[].body'` to read all previous review bodies.
            3. Run `gh pr view ${{ github.event.pull_request.number }} --json reviewThreads --jq '.reviewThreads[].comments[].body'` to read all previous inline review comments.
            4. Run `gh pr diff ${{ github.event.pull_request.number }}` to get the full diff.
            5. Read the changed files in full when you need more context beyond the diff.
            6. Read the following project convention files (if they exist): ${{ inputs.project_docs }}
            7. Cross-reference the current diff against previous reviews (both review bodies and inline comments) — identify which previously flagged issues have been fixed and which remain.
            8. Perform your review following the criteria below.
            9. Submit your review using `gh pr review`, including inline comments on specific lines for 🔴 and 🟡 issues.

            ## Previous Review Awareness

            You MUST check previous reviews on this PR before submitting yours. In your review body:
            - Include a **Previously Flagged** section that lists issues from prior reviews and their status (✅ Fixed or ⏳ Still Open).
            - Do NOT re-flag issues that have already been fixed in the current diff.
            - If all previous issues are resolved, acknowledge this briefly.
            - Focus your new findings on issues not previously identified.

            ## Review Criteria (in priority order)

            1. **Correctness** — Bugs, logic errors, race conditions, off-by-one errors
            2. **Security** — Injection, auth issues, exposed secrets, unsafe data handling
            3. **Architecture** — Component structure, separation of concerns
            4. **Code Standards** — Naming, documentation, file organization
            5. **Performance** — Unnecessary computation, missing optimization opportunities
            6. **Error Handling** — Missing error states, silent failures, unhandled promise rejections
            7. **Test Coverage** — Are new features/logic covered by tests?
            ${{ inputs.review_criteria }}

            ## Review Guidelines

            - **Be specific**: Reference file names, line numbers, and code snippets.
            - **Be actionable**: Every comment should suggest a fix or ask a clarifying question.
            - **Skip nitpicks**: Don't comment on formatting, trivial style preferences, or things a linter would catch.
            - **Acknowledge good work**: Call out clever solutions or well-structured code briefly.
            - **Scale your response**: Small PRs get brief reviews. Large PRs get thorough ones.

            ## Submitting the Review

            You MUST submit an actual GitHub review (not a comment). Use `gh pr review ${{ github.event.pull_request.number }}` with one of these flags:

            - `--approve` — Use this when there are NO blocking issues (see severity rules below).
            - `--request-changes` — Use this when there ARE blocking issues.

            Severity rules for blocking:
            - 🔴 issues ALWAYS block (request-changes).
            - 🟡 issues block ONLY if `block_on_yellow` is enabled: ${{ inputs.block_on_yellow }}
            - 🟢 issues never block.

            NEVER use `--comment`. Always either approve or request changes — take a clear stance.

            IMPORTANT: Pass the review body via a heredoc so markdown renders correctly:

            ```
            gh pr review NUMBER --approve --body "$(cat <<'REVIEW_EOF'
            Your markdown review here...
            REVIEW_EOF
            )"
            ```

            ## Inline Comments

            In addition to the review body, you MUST post inline comments on specific diff lines for every 🔴 and 🟡 issue. Use the GitHub CLI:

            ```
            gh api repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }}/comments \
              -f body="$(cat <<'COMMENT_EOF'
            **🔴 Bug: Short title**

            Description of the problem with specific references to what the code does wrong.

            **Suggestion:** Concrete fix description.

            \`\`\`suggestion
            corrected code here
            \`\`\`
            COMMENT_EOF
            )" \
              -f path="src/filename.tsx" \
              -F line=42 \
              -f side="RIGHT"
            ```

            ### Inline Comment Format — MANDATORY

            Every inline comment MUST follow this structure:
            1. **First line:** Severity emoji + bold category + colon + short title (e.g., `**🔴 Bug: Missing USING clause**`)
            2. **Body:** 1-3 sentences explaining the problem. Be specific about what goes wrong and why.
            3. **Suggestion line:** `**Suggestion:**` followed by the concrete fix.
            4. **Code block (when possible):** Use a `suggestion` fenced code block so GitHub renders a one-click "Apply suggestion" button.

            DO NOT post inline comments as plain text paragraphs. Every inline comment MUST have the bold severity title line and a Suggestion line. This is non-negotiable.

            ## Review Output Format — MANDATORY

            CRITICAL: Your review body MUST use proper GitHub-Flavored Markdown. This means:
            - Use `## Heading` syntax for section headers (NOT plain text like "SUMMARY:" or "ISSUES:")
            - Use GFM pipe tables with header rows and separator rows (NOT bullet lists)
            - Use HTML `<details><summary>` blocks for collapsible issue details
            - Use severity emoji prefixes: 🔴 🟡 🟢

            DO NOT write plain text. DO NOT use bullet lists where tables are specified. DO NOT skip the table/details structure.

            Your review body MUST contain these sections in this exact order:

            ### Section 1: Summary
            Start with `## Summary` header, then one sentence overview, then a verdict line:
            `**Verdict:** ✅ Approve` or `**Verdict:** ❌ Request Changes — N critical issues`

            ### Section 2: Previously Flagged (omit if no prior reviews)
            `## Previously Flagged` header, then a TABLE (not bullets):
            `| Issue | Status |`
            `|-------|--------|`
            `| Description | ✅ Fixed |`
            `| Description | ⏳ Still Open |`

            ### Section 3: Issues
            `## Issues` header, then a summary TABLE:
            `| # | Severity | Category | File | Line | Title |`
            `|---|----------|----------|------|------|-------|`
            `| 1 | 🔴 | Bug | \`file.tsx\` | L42 | Title |`

            Then for EACH issue, a collapsible details block:
            `<details>`
            `<summary><strong>1. 🔴 Bug: Title</strong> — <code>file.tsx:42</code></summary>`
            `(blank line)`
            `Description with line references.`
            `(blank line)`
            `**Suggestion:** Fix description with code snippet.`
            `(blank line)`
            `</details>`

            If no issues, write "No issues found — looks good!" and skip the table.

            Severity meanings:
            - 🔴 = bugs, security issues, correctness problems
            - 🟡 = UX issues, architectural concerns, missing error handling
            - 🟢 = minor suggestions, nice-to-haves

            ### Section 4: What Looks Good
            `## What Looks Good` header, then a TABLE (not bullets):
            `| Area | Note |`
            `|------|------|`
            `| Pattern or area | What was done well |`

            ### Section 5: Notes (optional, omit if nothing to add)
            `## Notes` header, then free-form text for observations, questions, testing suggestions, or patterns noticed that don't fit above.

            ### REMINDER
            This format is non-negotiable. Every review MUST use markdown `##` headers, GFM pipe `|` tables, and HTML `<details>` blocks exactly as described. Plain text labels, bullet lists in place of tables, or missing structure will be considered a failure to follow instructions.

          claude_args: >-
            ${{ inputs.model && format('--model {0}', inputs.model) || '' }}
            --allowed-tools "Bash(gh issue view:*),Bash(gh search:*),Bash(gh issue list:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr list:*),Bash(gh pr review:*),Bash(gh api:*)"
